# ~/.config/kitty/kitty.conf

font_size        14

# BEGIN_KITTY_FONTS
font_family      family="Terminus (TTF)"
bold_font        auto
italic_font      auto
bold_italic_font auto
# END_KITTY_FONTS

confirm_os_window_close 0
enable_audio_bell no

# Cursor
shell_integration no-cursor
cursor_shape underline
cursor_blink_interval 0

# Scrollback
scrollback_lines 10000

# Tabs
tab_bar_edge top
tab_bar_align left
tab_bar_style powerline

# Layouts
enabled_layouts         grid,tall:bias=50;full_size=2, *

# Window padding
window_padding_width 10

# Clipboard shortcuts
map ctrl+shift+c copy_to_clipboard
map ctrl+shift+v paste_from_clipboard

# Open new tab/window
map ctrl+shift+t new_tab
map ctrl+shift+enter new_window

# Best option on Linux if your session is Wayland
hide_window_decorations yes

# Keep kitty's own per-split title bars disabled
# (this is already the default, but I’m making it explicit)
window_title_bar_min_windows 0

### Theme

# BEGIN_KITTY_THEME
# Carbonfox
include current-theme.conf
# END_KITTY_THEME

background_opacity 1.0
background_blur 1

# --- Productivity shortcuts ---

# Fast split navigation (vim-style)
map alt+h neighboring_window left
map alt+j neighboring_window bottom
map alt+k neighboring_window top
map alt+l neighboring_window right

# Open in same cwd
map alt+enter new_window_with_cwd
map alt+t new_tab_with_cwd
map alt+w close_window

# Quick tab jumps
map alt+1 goto_tab 1
map alt+2 goto_tab 2
map alt+3 goto_tab 3
map alt+4 goto_tab 4
map alt+5 goto_tab 5
map alt+6 goto_tab 6
map alt+7 goto_tab 7
map alt+8 goto_tab 8
map alt+9 goto_tab 9

# Temporary "zoom" for the current pane
map alt+z toggle_layout stack

# Better copy behavior:
# copies selection, or if nothing is selected copies last command output
map alt+c copy_selection_or_last_command_output

# Hints helpers
map alt+u kitten hints --type=url
map alt+f kitten hints --type=path

# Open file:line matches in Neovim in a new tab
map alt+g kitten hints --type=linenum --linenum-action=tab nvim +{line} {path}
